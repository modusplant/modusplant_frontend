name: Sync to Personal Repo

on:
  push:
    branches:
      - '**' 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 조직 레포지토리 체크아웃
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false  # 🚨 추가된 핵심 설정: 기본 봇 계정 정보 저장 안 함!

      - name: 개인 레포지토리로 자동 푸시 (브랜치 동기화)
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git remote add target https://${PERSONAL_TOKEN}@github.com/kang-byeongguk/frontend_modusplant.git
          git push target HEAD:refs/heads/${GITHUB_REF_NAME} --force